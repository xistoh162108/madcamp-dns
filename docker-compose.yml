version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dnsapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-dnsapi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Do NOT expose port 5432 to the host in production.
    # Uncomment only for local development or DB migrations via a management tool.
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dnsapi} -d ${POSTGRES_DB:-dnsapi}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-dnsapi}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-dnsapi}?connection_limit=10&connect_timeout=10&pool_timeout=15&options=-c%20statement_timeout%3D5000
      ROOT_DOMAIN: ${ROOT_DOMAIN:?ROOT_DOMAIN must be set}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:?CLOUDFLARE_ZONE_ID must be set}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN must be set}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY must be set}
      # Optional — only needed for the Cloudflare Tunnel feature (/v1/tunnels,
      # /admin/tunnels). Left unset/empty is fine: those endpoints alone will
      # return a clear error until configured; every other endpoint is unaffected.
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_TUNNEL_API_TOKEN: ${CLOUDFLARE_TUNNEL_API_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  postgres_data:
